<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配置フェーズ AIサポート</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brown-dark: #3d2b1f;
    --brown-mid: #7a5c4a;
    --brown-light: #b08970;
    --cream: #faf6f0;
    --beige: #f0e8dc;
    --beige-mid: #e2d5c5;
    --accent: #c4956a;
    --white: #ffffff;
    --text: #3d2b1f;
    --text-muted: #9a7d6a;
    --bubble-user: #5c3d2e;
    --shadow: rgba(61,43,31,0.08);
  }

  html, body {
    height: 100%;
    font-family: 'Hiragino Kana', 'Hiragino Sans', 'Noto Sans JP', 'Yu Gothic', sans-serif;
    background: var(--cream);
    color: var(--text);
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    background: var(--white);
    box-shadow: 0 0 32px var(--shadow);
  }

  /* ── Header ── */
  #header {
    background: var(--brown-dark);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  #hd-avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  #hd-info { flex: 1; }
  #hd-name { color: #fff; font-size: 15px; font-weight: 600; letter-spacing: 0.02em; }
  #hd-sub  { color: rgba(255,255,255,0.55); font-size: 11px; margin-top: 2px; }

  #hd-status {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #6bcb77;
    flex-shrink: 0;
  }

  /* ── API Key Setup ── */
  #api-setup {
    background: var(--beige);
    border-bottom: 1px solid var(--beige-mid);
    padding: 12px 16px;
    flex-shrink: 0;
  }

  #api-setup.hidden { display: none; }

  #api-setup p {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
    line-height: 1.6;
  }

  #api-setup-row {
    display: flex;
    gap: 8px;
  }

  #api-key-input {
    flex: 1;
    border: 1px solid var(--beige-mid);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    font-family: monospace;
    background: var(--white);
    color: var(--text);
    outline: none;
  }

  #api-key-input:focus { border-color: var(--accent); }

  #api-key-btn {
    background: var(--brown-dark);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }

  #api-key-btn:hover { background: var(--brown-mid); }

  #api-key-status {
    font-size: 11px;
    margin-top: 6px;
    color: var(--text-muted);
  }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .msg-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .msg-row.user { flex-direction: row-reverse; }

  .msg-av {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .msg-av.ai   { background: var(--accent); }
  .msg-av.user { background: var(--beige-mid); color: var(--brown-dark); font-size: 12px; }

  .bubble {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.7;
  }

  .bubble.ai {
    background: var(--beige);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .bubble.user {
    background: var(--bubble-user);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  /* typing dots */
  .typing {
    background: var(--beige);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    padding: 12px 16px;
    display: flex; gap: 5px; align-items: center;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--brown-light);
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  /* ── Quick buttons ── */
  #quick-wrap {
    padding: 8px 14px 6px;
    flex-shrink: 0;
    border-top: 1px solid var(--beige-mid);
    background: var(--cream);
  }

  #quick-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 7px;
  }

  #quick-btns {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .qbtn {
    background: var(--white);
    border: 1px solid var(--beige-mid);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--brown-mid);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .qbtn:hover {
    background: var(--beige);
    border-color: var(--accent);
    color: var(--brown-dark);
  }

  /* ── Input row ── */
  #input-row {
    padding: 10px 14px 16px;
    display: flex;
    gap: 8px;
    align-items: flex-end;
    border-top: 1px solid var(--beige-mid);
    background: var(--white);
    flex-shrink: 0;
  }

  #msg-input {
    flex: 1;
    border: 1px solid var(--beige-mid);
    border-radius: 22px;
    padding: 10px 16px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: var(--cream);
    resize: none;
    line-height: 1.5;
    max-height: 100px;
    outline: none;
    transition: border-color 0.15s;
  }

  #msg-input::placeholder { color: var(--text-muted); opacity: 0.7; }
  #msg-input:focus { border-color: var(--accent); }

  #send-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--brown-dark);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  #send-btn:hover { background: var(--brown-mid); }
  #send-btn:disabled { background: var(--beige-mid); cursor: not-allowed; }

  #send-btn svg { fill: #fff; width: 16px; height: 16px; }

  /* scrollbar */
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--beige-mid); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div id="header">
    <div id="hd-avatar">🏠</div>
    <div id="hd-info">
      <div id="hd-name">Shinobu AI サポート</div>
      <div id="hd-sub">配置フェーズ専用アシスタント</div>
    </div>
    <div id="hd-status"></div>
  </div>

  <!-- API Key Setup (Shinobuさんがキーを埋め込む場合は下のSCRIPT内 FIXED_API_KEY に入力) -->
  <div id="api-setup">
    <p>🔑 ご利用には Anthropic API キーが必要です。<br>キーは端末内にのみ保存され、外部に送信されません。</p>
    <div id="api-setup-row">
      <input id="api-key-input" type="password" placeholder="sk-ant-..." autocomplete="off">
      <button id="api-key-btn" onclick="saveApiKey()">設定する</button>
    </div>
    <div id="api-key-status"></div>
  </div>

  <!-- Messages -->
  <div id="messages"></div>

  <!-- Quick buttons -->
  <div id="quick-wrap">
    <div id="quick-label">今の状況は？</div>
    <div id="quick-btns">
      <button class="qbtn" onclick="sendQuick('アイデアが全然浮かびません…')">💡 アイデアが出ない</button>
      <button class="qbtn" onclick="sendQuick('やる気がなくなってきました')">🔋 やる気ダウン</button>
      <button class="qbtn" onclick="sendQuick('どこから手をつければいいかわかりません')">🗂 手順がわからない</button>
      <button class="qbtn" onclick="sendQuick('家族に協力してもらえません')">👨‍👩‍👧 家族の巻き込み方</button>
    </div>
  </div>

  <!-- Input -->
  <div id="input-row">
    <textarea id="msg-input" rows="1" placeholder="何でも話しかけてみてください…"></textarea>
    <button id="send-btn" onclick="handleSend()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
// ============================================================
// ★ Shinobuさんへ：APIキーを直接埋め込む場合はここに入力
//    例: const FIXED_API_KEY = 'sk-ant-api03-xxxxx';
//    受講生がキーを入力する方式の場合は空のままにしてください
// ============================================================
const FIXED_API_KEY = '';

const SYSTEM_PROMPT = `あなたは余白回復プログラムの「配置フェーズ専用AIサポート」です。
講師Shinobuさんの分身として、受講生に寄り添います。

## Shinobuさんの口調の特徴
- LINEのような親しみやすいカジュアルな話し方
- 「〜ですよ〜」「〜だよね！」「〜してみてね！」などの語尾
- 絵文字を適度に使う（😊💪🏠✨）
- まず「わかる！」「そうだよね〜」と共感してから解決策を提案
- 短い段落で読みやすく
- 専門用語は使わず、やさしい言葉で

## 配置フェーズの知識
配置フェーズの流れ：定位置の考え方 → 仮置き実験 → 振り返り → 定位置マップ確定

【アイデアが出ない時】
- まず「今どこで何をしているか」を写真や手書きで観察するところから
- 「片手でできるか？」という問いかけが効果的
- キッチン・洗面所・リビングなど場所を絞って考える
- 完璧な答えを出そうとしない。仮説でOK！
- 行動分析シートで動線を書き出す

【やり方がわからない時】
- 「毎日一番目に入る場所」か「一番使う場所」の1か所だけ集中
- 整理が終わってなくても配置フェーズは並行OK
- 仮置きカードに「試す配置・観察ポイント・1週間後評価」を書く
- 評価は◎△✗の3択でOK。ゲーム感覚で！
- 「引っ越し直後状態」になるのは正常

【やる気がなくなった時】
- ✗が多い時期こそデータが集まっている証拠
- 「試してみた」こと自体が前進
- 1か所だけ、5分だけ、と小さく区切る
- 完璧じゃなくていい。80点でOK！

【家族巻き込み】
- 「置かないで」ではなく「ここに置いてくれると助かる！」と肯定的に
- 一緒に決める過程に巻き込む
- ラベルや定位置マップで「見える化」する
- 「今、実験中！」と前もって伝えておく

## 回答スタイル
- 必ず共感から始める
- 具体的なアクションを1〜2つ提案（多すぎない）
- 最後に励ましや次のステップを添える
- 200文字前後でコンパクトに（スマホで読みやすく）`;

// ── State ──
let history = [];
let busy = false;
let apiKey = FIXED_API_KEY || localStorage.getItem('shinobu_api_key') || '';

// ── Init ──
window.addEventListener('DOMContentLoaded', () => {
  if (apiKey) {
    document.getElementById('api-setup').classList.add('hidden');
    addBubble('ai', 'こんにちは〜！配置フェーズのAIサポートです😊\n\n「アイデアが浮かばない」「家族がなかなか協力してくれない」「やる気がなくなってきた」…どんなことでも話しかけてみてね！\n\n下のボタンから今の状況を選んでもOKですよ〜');
  } else {
    addBubble('ai', 'ご利用ありがとうございます😊 上の欄にAPIキーを設定すると使えるようになります！');
  }

  const input = document.getElementById('msg-input');
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 100) + 'px';
  });
});

// ── API Key ──
function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val.startsWith('sk-ant-')) {
    document.getElementById('api-key-status').textContent = '⚠ キーの形式が正しくないようです（sk-ant- から始まります）';
    return;
  }
  apiKey = val;
  localStorage.setItem('shinobu_api_key', val);
  document.getElementById('api-setup').classList.add('hidden');
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  history = [];
  addBubble('ai', 'APIキーの設定ができました！\n\nこんにちは〜！配置フェーズのAIサポートです😊\n\n「アイデアが浮かばない」「家族がなかなか協力してくれない」…どんなことでも話しかけてみてね！');
}

// ── UI helpers ──
function addBubble(role, text) {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row ' + (role === 'user' ? 'user' : '');
  const av = document.createElement('div');
  av.className = 'msg-av ' + (role === 'user' ? 'user' : 'ai');
  av.textContent = role === 'user' ? '👤' : '🏠';
  const bub = document.createElement('div');
  bub.className = 'bubble ' + role;
  bub.innerHTML = text.replace(/\n/g, '<br>');
  if (role === 'user') { row.appendChild(bub); row.appendChild(av); }
  else { row.appendChild(av); row.appendChild(bub); }
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row'; row.id = 'typing-row';
  const av = document.createElement('div');
  av.className = 'msg-av ai'; av.textContent = '🏠';
  const t = document.createElement('div');
  t.className = 'typing';
  t.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  row.appendChild(av); row.appendChild(t);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing-row');
  if (t) t.remove();
}

// ── Send ──
async function send(text) {
  if (busy || !text.trim()) return;
  if (!apiKey) { addBubble('ai', '上のAPIキー欄に設定してから使ってね😊'); return; }

  busy = true;
  document.getElementById('send-btn').disabled = true;
  addBubble('user', text);
  history.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 600,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const reply = data.content?.[0]?.text || 'ごめんね、うまく受け取れなかった😅 もう一度話しかけてみてね！';
    hideTyping();
    addBubble('ai', reply);
    history.push({ role: 'assistant', content: reply });
  } catch (e) {
    hideTyping();
    const msg = e.message?.includes('401')
      ? '🔑 APIキーが正しくないようです。もう一度確認してみてね！'
      : '接続がうまくいかなかったみたい😅 少し待ってからもう一度試してね！';
    addBubble('ai', msg);
  }

  busy = false;
  document.getElementById('send-btn').disabled = false;
}

function handleSend() {
  const inp = document.getElementById('msg-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  inp.style.height = 'auto';
  send(text);
}

function sendQuick(text) { send(text); }
</script>
</body>
</html>
